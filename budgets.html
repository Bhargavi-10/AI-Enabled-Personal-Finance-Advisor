<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgets</title>
    <link rel="stylesheet" href="transaction.css">
</head>
<body>
    <div class="container">
        <!--SIDEBAR-->
        <div class="sidebar">
            <h2>Finance Advisor</h2>
            <a href="dashboard.html">Dashboard</a>
            <a href="transactions.html">Transactions</a>
            <a href="income.html">Income</a>
            <a href="budgets.html">Budgets</a>
            <a href="analytics.html">Analytics</a>
            <a href="ai-advisor.html">AI Advisor</a>
            <button id="logoutBtn">🚪 Logout </button>
        </div>

        <!--MAIN CONTENT-->
        <div class="main-content">
            <h1>Budgets</h1>

            <!--ADD BUDGET FORM-->
            <div class="transaction-form">
                <h2>Add Budget</h2>
                <div class="form-row">
                    <label for="month">Month :</label>
                    <select id="month">
                            <option value="">Select Month</option>
                            <option value="1">January</option>
                            <option value="2">February</option>
                            <option value="3">March</option>
                            <option value="4">April</option>
                            <option value="5">May</option>
                            <option value="6">June</option>
                            <option value="7">July</option>
                            <option value="8">August</option>
                            <option value="9">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                </div>

                <div class="form-row">
                    <label for="category">Category :</label>
                    <input type="text" id="category">
                </div>

                <div class="form-row">
                    <label for="year">Year :</label>
                    <select id="year"></select>
                </div>

                <div class="form-row">
                    <label for="amount">Amount :</label>
                    <input type="number" id="amount" step="0.01" min="0">
                </div>

                <button id="addBtn">ADD BUDGET</button>    
            </div>


            <!--BUDGET TABLE-->
            <div class="budget-table">
                <h2>All Budgets</h2>
                <table>
                    <thead>
                        <tr>
                            <th>year</th>
                            <th>month</th>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="budgetBody"></tbody>     
                </table>
            </div>
        </div>
    </div>

    <!--EDIT POP UP-->
    <div id="editModal" class="modal">

    <div class="modal-content">

        <h2>Edit Transaction</h2>

        <label>year</label>
        <select id="editYear"></select>

        <label>month</label>
        <select id="editMonth">
            <option value="1">January</option>
            <option value="2">February</option>
            <option value="3">March</option>
            <option value="4">April</option>
            <option value="5">May</option>
            <option value="6">June</option>
            <option value="7">July</option>
            <option value="8">August</option>
            <option value="9">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
        </select>

        <label>Category</label>
        <input type="text" id="editCategory">

        <label>Amount</label>
        <input type="number" id="editAmount">

        <div class="modal-buttons">

            <button id="updateBtn">
                Apply Changes
            </button>

            <button id="closeBtn">
                Cancel
            </button>

        </div>

    </div>

    </div>
    <script src="budget.js"></script> 
    <script src="logout.js"></script> 
</body>
</html>
