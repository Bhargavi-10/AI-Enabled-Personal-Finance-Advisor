<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics</title>
    <link rel="stylesheet" href="analytics.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <!--SIDEBAR-->
        <div class="sidebar">
            <h2>Finance Advisor</h2>
            <a href="dashboard.html">Dashboard</a>
            <a href="transactions.html">Transactions</a>
            <a href="income.html">Income</a>
            <a href="budgets.html">Budgets</a>
            <a href="analytics.html">Analytics</a>
            <a href="ai-advisor.html">AI Advisor</a>  
            <button id="logoutBtn">🚪 Logout </button>         
        </div>

        <!--MAIN CONTENT-->
        <div class="main-content">
            <h1>Financial Analytics</h1>
            <div class="charts-grid">
                <div class="chart-card">
                    <h3>Monthly Spending Trend</h3>
                    <canvas id="monthlySpendingChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Daily Spending Trend</h3>
                    <canvas id="dailySpendingChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Category Spending Trend</h3>
                    <canvas id="categorySpendingChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Monthly Savings Trend</h3>
                    <canvas id="monthlySavingsChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Income VS Expense</h3>
                    <canvas id="incomeExpenseChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Budget VS Actual Spending</h3>
                    <canvas id="budgetActualChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    <script src="analytics.js"></script>
    <script src="logout.js"></script> 
</body>
</html>
