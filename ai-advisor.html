<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Advisor</title>
    <link rel="stylesheet" href="ai-advisor.css">
</head>
<body>
    <div class="container">
        <!--SIDEBAR-->
        <div class="sidebar">
            <h2>Finance Advisor</h2>

            <a href="dashboard.html">Dashboard</a>
            <a href="transactions.html">Transactions</a>
            <a href="income.html">Income</a>
            <a href="budgets.html">Budgets</a>
            <a href="analytics.html">Analytics</a>
            <a href="ai-advisor.html">AI Advisor</a>
            <button id="logoutBtn">🚪 Logout </button>
        </div>

        <!--MAIN CONTENT-->
        <div class="main-content">
            <h1>AI FINANCIAL ADVISOR</h1>
            <div class="chat-container">
                <div id="chatBox" class="chat-box">
                   <div class="chat-title">CHATBOT</div>
                </div>
                <div class="chat-input">
                    <input type="text" id="userMessage" placeholder="Ask AI about spending , savings , budgets">
                    <button id="sendBtn">Send</button>
                    <button id="clearBtn">Clear</button>
                </div>
            </div>

            <div class="prediction-section">
                <div class="prediction-card">
                    <h3>Next Month Predicted Spending</h3>
                    <p id="predictedSpending">Rs.0</p>
                </div>
                <div class="prediction-card">
                    <h3>Expected Savings</h3>
                    <p id="predictedSavings">Rs.0</p>
                </div>
            </div>
        </div>
    </div>
<script src="ai-advisor.js"></script>
<script src="logout.js"></script> 
</body>
</html>
